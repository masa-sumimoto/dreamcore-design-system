<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dreamcore favicon — the eternal sunset, condensed into 64px -->
  <defs>
    <clipPath id="soft">
      <rect width="64" height="64" rx="16" />
    </clipPath>
    <radialGradient id="bloom" cx="0.42" cy="0.4" r="0.72">
      <stop offset="0" stop-color="#f9a8d4" />
      <stop offset="0.55" stop-color="#f9a8d4" stop-opacity="0.65" />
      <stop offset="1" stop-color="#f9a8d4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sky" cx="0.12" cy="0.92" r="0.65">
      <stop offset="0" stop-color="#c7e2ff" stop-opacity="0.85" />
      <stop offset="1" stop-color="#c7e2ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="lilac" cx="0.88" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#d8b4fe" stop-opacity="0.7" />
      <stop offset="1" stop-color="#d8b4fe" stop-opacity="0" />
    </radialGradient>
  </defs>
  <g clip-path="url(#soft)">
    <rect width="64" height="64" fill="#fef2f2" />
    <rect width="64" height="64" fill="url(#sky)" />
    <rect width="64" height="64" fill="url(#lilac)" />
    <rect width="64" height="64" fill="url(#bloom)" />
  </g>
</svg>
